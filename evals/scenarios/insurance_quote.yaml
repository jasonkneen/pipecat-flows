# Insurance quote. Exercises parameterized node creation: collect_marital_status
# builds the quote-calculation node from the stored age, and calculate_quote
# builds the results node from the computed quote, which then accepts coverage
# adjustments.
name: insurance_quote

turns:
  # Kept lenient: the bot asks for age here, but the local STT can garble the
  # exact question, so we only require that it greets and starts the quote.
  - expect:
      - event: response
        eval: "the bot greets the customer and begins helping with an insurance quote"

  - user: "I'm thirty years old."
    expect:
      - event: function_call
        calls:
          - name: collect_age
            args: { age: 30 }

  - user: "I'm married."
    expect:
      - event: function_call
        calls:
          - name: collect_marital_status
            args: { marital_status: married }

  # The quote-calculation node is told to call calculate_quote with the
  # collected details.
  - user: "Okay, what's my quote?"
    expect:
      - event: function_call
        calls:
          - name: calculate_quote
      - event: response
        eval: "the bot explains the insurance quote, including a monthly premium"

  - user: "Can you raise the coverage to five hundred thousand with a two thousand dollar deductible?"
    expect:
      - event: function_call
        calls:
          - name: update_coverage
      - event: response
        eval: "the bot explains the updated quote after the coverage change"

  # end_quote transitions to the end node (end_conversation post-action), so we
  # assert only the function call.
  - user: "Great, I'm all set."
    expect:
      - event: function_call
        calls:
          - name: end_quote
