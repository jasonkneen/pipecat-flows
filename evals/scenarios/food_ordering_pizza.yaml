# Food ordering, pizza branch. Exercises dynamic routing (choose_pizza edge
# function), a node function with enum args (select_pizza_order), a global
# function available at every node (get_delivery_estimate), and the
# FlowsFunctionSchema registration path.
name: food_ordering_pizza

user: !include _user_audio.yaml
judge: !include _judge_audio.yaml

turns:
  - expect:
      - event: response
        eval: "the bot greets the user and offers to take a food order"

  - user: "I'd like to order a pizza."
    expect:
      - event: function_call
        calls:
          - name: choose_pizza

  # Transitions to the confirmation node, which reads the order back.
  - user: "A large pepperoni please."
    expect:
      - event: function_call
        calls:
          - name: select_pizza_order
            args: { size: large, pizza_type: pepperoni }
      - event: response
        eval: "the bot reads back or confirms a large pepperoni pizza order"

  # Global function, available even mid-order.
  - user: "How long will delivery take?"
    expect:
      - event: function_call
        calls:
          - name: get_delivery_estimate

  # complete_order transitions to the end node (end_conversation post-action),
  # so we assert only the function call (see the note in hello_world.yaml).
  - user: "That's everything, please confirm my order."
    expect:
      - event: function_call
        calls:
          - name: complete_order
