# Multi-worker handoff: a free-form router worker hands off to a structured
# Flows reservation worker and back. The conversation starts on the router
# (transfer_to_reservation), crosses into the reservation flow (collect_party_size,
# check_availability against the mock backend), and ends inside the flow
# (end_reservation -> end node -> end_conversation action). A 6:00 PM request is
# open in the mock system, so check_availability routes straight to confirmation.
name: multi_worker_handoff

turns:
  - expect:
      - event: response
        eval: "the bot greets the user and offers to answer questions or book a table"

  # Router hands off to the reservation worker, which then asks for party size.
  - user: "I'd like to book a table."
    expect:
      - event: function_call
        calls:
          - name: transfer_to_reservation
      - event: response
        eval: "the bot asks how many people are in their party"

  - user: "There will be two of us."
    expect:
      - event: function_call
        calls:
          - name: collect_party_size
            args: { size: 2 }
      - event: response
        eval: "the bot asks what time they would like to dine"

  # 6:00 PM is available in the mock backend, so this routes to confirmation.
  - user: "We'd like to come at six PM."
    expect:
      - event: function_call
        calls:
          - name: check_availability
      - event: response
        eval: "the bot confirms a reservation is available at the requested time"

  # end_reservation transitions to the end node, whose end_conversation post-action
  # closes the session, so we assert only the function call.
  - user: "No, that's all, thank you."
    expect:
      - event: function_call
        calls:
          - name: end_reservation
